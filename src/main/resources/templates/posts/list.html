<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>XorahtBlog</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="header">
    <nav class="nav">
        <a th:href="@{/posts}">Posty</a>
        <a th:href="@{/posts/new}">Dodaj post</a>
    </nav>
    <h1>XorahtBlog</h1>
</header>

<main class="container">
    <h2>Lista postów</h2>

    <p th:if="${#lists.isEmpty(posts)}">Brak postów. Dodaj pierwszy!</p>

    <ul class="post-list" th:if="${!#lists.isEmpty(posts)}">
        <li th:each="p : ${posts}" class="post-item">
            <a th:href="@{|/posts/${p.id}|}" th:text="${p.title}">Tytuł</a>
            <div class="meta" th:text="${#temporals.format(p.createdAt, 'yyyy-MM-dd HH:mm')}">data</div>
            <p th:text="${#strings.abbreviate(p.content, 160)}">treść</p>
            <form th:action="@{|/posts/${p.id}/delete|}" method="post" style="margin-top: 8px;">
                <button type="submit" onclick="return confirm('Na pewno usunąć?');">Usuń</button>
            </form>
        </li>
    </ul>
</main>
</body>
</html>
